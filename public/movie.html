<!doctype html>
<html lang="en">


<head>
  <meta charset="utf-8">
  <script type="text/javascript" src="scripts/scripts.js"></script>
  <link rel="stylesheet" href="styles/styles.css">
  <title>Sign In</title>
</head>

<body onload="openmovie()">
  <div class="top-bar">
    <img src="logo.png" width = "300" height = "55">
  </div>
  <div style="margin-top: 115px;"></div>

  <nav class="nav-bar">
    <a class="mymovies" href="mymovies.html">My Movies</a>
    <a class="watchlist" href="watchlist.html">Watchlist</a>
    <a class="search" href="search.html">Search</a>
    <a class="signout" href="signin.html">Sign Out</a>
  </nav>

  <div>
    <h1 id = "movie-title"></h1>
  </div>

  <div>
    <img id = "movie-poster" src = "" width = "150" height = "250" alt = "Movie Poster">
  </div>
  
  <div>
    <p id = "movie-genre"></p>
    <p id = "movie-year"></p>
  </div>
  
  <div>
    <p id = "movie-plot"></p>
  </div>

  <button id = "addToList">Toggle on Watchlist</button>

  <div class = "star-container">
    <button class = "image-button" id = "1-star"></button>
    <button class = "image-button" id = "2-star"></button>
    <button class = "image-button" id = "3-star"></button>
    <button class = "image-button" id = "4-star"></button>
    <button class = "image-button" id = "5-star"></button>
  </div>

</body>

</html>
